<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>听书智能客服系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #1a73e8;
  --primary-dark: #1557b0;
  --bg: #f0f2f5;
  --white: #ffffff;
  --text: #333333;
  --text-secondary: #888888;
  --border: #e8e8e8;
  --bubble-bot: #ffffff;
  --bubble-user: #1a73e8;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --status-green: #10b981;
  --status-orange: #f59e0b;
  --status-red: #ef4444;
  --status-gray: #9ca3af;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.app-container {
  width: 1100px;
  height: 92vh;
  max-height: 800px;
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  display: flex;
  overflow: hidden;
}

/* =========== Chat Column (Left) =========== */
.chat-column {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* =========== Header =========== */
.header {
  background: var(--primary);
  color: var(--white);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.header-left { display: flex; align-items: center; gap: 10px; }
.header-logo { width: 32px; height: 32px; background: rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.header-title { font-size: 16px; font-weight: 600; }

.header-right { display: flex; align-items: center; gap: 10px; }
.header label { font-size: 13px; opacity: 0.9; }
.header input {
  padding: 6px 12px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  background: rgba(255,255,255,0.15);
  color: var(--white);
  font-size: 13px;
  width: 100px;
  outline: none;
}
.header input::placeholder { color: rgba(255,255,255,0.5); }
.header input:focus { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.2); }

.btn-refresh {
  padding: 6px 12px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  background: rgba(255,255,255,0.15);
  color: var(--white);
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-refresh:hover { background: rgba(255,255,255,0.25); }

/* =========== Quick Actions =========== */
.quick-actions {
  display: flex;
  gap: 8px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
}

.quick-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 16px;
  background: var(--white);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.quick-btn:hover { background: var(--primary); color: var(--white); border-color: var(--primary); }

/* =========== Chat Area =========== */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  background: var(--bg);
}

/* Welcome hint */
.welcome-hint {
  text-align: center;
  color: var(--text-secondary);
  font-size: 14px;
  margin-top: 60px;
}
.welcome-hint .icon { font-size: 48px; margin-bottom: 12px; }

/* Message row */
.msg-row { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.3s ease; }
.msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
.msg-row.bot  { align-self: flex-start; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Avatar */
.msg-avatar {
  width: 36px; height: 36px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.msg-row.bot .msg-avatar  { background: #e8f0fe; color: var(--primary); }
.msg-row.user .msg-avatar { background: var(--primary); color: var(--white); }

/* Bubble */
.msg-bubble {
  padding: 10px 14px; border-radius: 10px;
  font-size: 14px; line-height: 1.6; word-break: break-word;
}
.msg-row.bot .msg-bubble  { background: var(--bubble-bot); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.06); border-top-left-radius: 2px; white-space: pre-wrap; }
.msg-row.user .msg-bubble { background: var(--bubble-user); color: var(--white); border-top-right-radius: 2px; }

/* Card/Object bubble */
.msg-card {
  background: #f8f9ff; border: 1px solid #dce3f0; border-radius: 8px;
  padding: 10px 12px; margin-top: 6px;
  font-size: 13px; color: #555;
}
.msg-card strong { color: var(--text); }

/* Typing indicator */
.typing-indicator {
  align-self: flex-start;
  display: flex; gap: 6px; padding: 10px 14px;
  background: var(--bubble-bot); border-radius: 10px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}
.typing-indicator span {
  width: 8px; height: 8px; border-radius: 50%;
  background: #c0c0c0; animation: bounce 1.2s infinite ease-in-out;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

/* Timestamp */
.msg-time {
  font-size: 11px; color: var(--text-secondary);
  margin-top: 2px; text-align: center;
}
.msg-row.user .msg-time { text-align: right; }
.msg-row.bot .msg-time  { text-align: left; }

/* =========== Input Area =========== */
.input-area {
  display: flex; gap: 10px; padding: 14px 20px;
  border-top: 1px solid var(--border); flex-shrink: 0;
  background: var(--white);
}
.input-area textarea {
  flex: 1; resize: none; border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; font-size: 14px;
  font-family: inherit; outline: none; height: 42px;
  line-height: 1.4; transition: border-color 0.2s;
}
.input-area textarea:focus { border-color: var(--primary); }

.btn-send {
  padding: 0 24px; border: none; border-radius: 8px;
  background: var(--primary); color: var(--white);
  font-size: 14px; font-weight: 500; cursor: pointer;
  transition: background 0.2s; white-space: nowrap;
}
.btn-send:hover { background: var(--primary-dark); }
.btn-send:disabled { opacity: 0.6; cursor: not-allowed; }

/* =========== User Status Warning =========== */
.status-warning {
  padding: 10px 20px;
  background: #fef2f2;
  border-top: 1px solid #fecaca;
  border-bottom: 1px solid #fecaca;
  color: #dc2626;
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  flex-shrink: 0;
}
.input-area.disabled textarea {
  background: #f5f5f5;
  color: #999;
  cursor: not-allowed;
}
.input-area.disabled .btn-send {
  background: #ccc;
  cursor: not-allowed;
}

/* =========== History Separator =========== */
.history-separator {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 8px 0;
  color: #999;
  font-size: 12px;
  flex-shrink: 0;
}
.history-separator::before,
.history-separator::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e0e0e0;
}

/* =========== Orders Panel (Right) =========== */
.orders-panel {
  width: 320px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-left: 1px solid var(--border);
  background: #fafbfc;
}

.orders-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.orders-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 6px;
}

.orders-count {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-secondary);
  background: #e8ecf1;
  padding: 2px 8px;
  border-radius: 10px;
}

.btn-refresh-orders {
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--white);
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-refresh-orders:hover { background: var(--primary); color: var(--white); border-color: var(--primary); }

.orders-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.orders-empty {
  text-align: center;
  color: var(--text-secondary);
  font-size: 13px;
  margin-top: 80px;
}
.orders-empty .icon { font-size: 36px; margin-bottom: 8px; opacity: 0.5; }

/* Order Card */
.order-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.order-card:hover {
  border-color: var(--primary);
  box-shadow: 0 2px 8px rgba(26,115,232,0.12);
  transform: translateY(-1px);
}

.order-card-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.order-card-no {
  font-size: 12px;
  color: var(--text-secondary);
  font-family: monospace;
}

.order-card-amount {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

.order-card-time {
  font-size: 12px;
  color: var(--text-secondary);
}

.order-card-status {
  font-size: 12px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 10px;
  display: inline-block;
}

.status-paid { background: #d1fae5; color: #059669; }
.status-pending { background: #fef3c7; color: #d97706; }
.status-cancelled { background: #f3f4f6; color: #6b7280; }
.status-refunded,
.status-refunding { background: #fee2e2; color: #dc2626; }
.status-expired { background: #f3f4f6; color: #9ca3af; }
.status-failed { background: #fee2e2; color: #dc2626; }
.status-completed { background: #d1fae5; color: #059669; }

/* =========== Toast =========== */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  padding: 10px 24px; border-radius: 8px; font-size: 14px; z-index: 999;
  animation: slideDown 0.3s ease; color: var(--white);
}
.toast.error { background: #e74c3c; }
.toast.info  { background: var(--primary); }
@keyframes slideDown { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
</style>
</head>
<body>

<div class="app-container">
  <!-- ==================== Chat Column (Left) ==================== -->
  <div class="chat-column">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="header-logo">&#9835;</div>
        <span class="header-title">听书智能客服系统</span>
      </div>
      <div class="header-right">
        <label>用户ID</label>
        <input type="text" id="userIdInput" value="1" placeholder="输入用户ID">
        <button class="btn-refresh" onclick="switchUser()">切换</button>
        <button class="btn-refresh" onclick="loadHistory()" title="刷新历史">&#8635;</button>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
      <button class="quick-btn" onclick="sendQuick('帮我查订单')">查订单</button>
      <button class="quick-btn" onclick="sendQuick('我最近听了什么')">查播放记录</button>
      <button class="quick-btn" onclick="sendQuick('我要退款')">申请退款</button>
      <button class="quick-btn" onclick="sendQuick('我要提交工单')">提交工单</button>
      <button class="quick-btn" onclick="sendQuick('有哪些VIP会员套餐')">会员咨询</button>
      <button class="quick-btn" onclick="sendQuick('你好')">打招呼</button>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
      <div class="welcome-hint" id="welcomeHint">
        <div class="icon">&#9835;</div>
        <div>听书智能助手为你服务</div>
        <div style="font-size:12px;margin-top:6px;">可以查订单、查播放记录、申请退款或提交工单</div>
      </div>
    </div>

    <!-- Status Warning (hidden by default) -->
    <div class="status-warning" id="statusWarning" style="display:none;"></div>

    <!-- Input Area -->
    <div class="input-area" id="inputArea">
      <textarea id="msgInput" placeholder="输入消息..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
  </div>

  <!-- ==================== Orders Panel (Right) ==================== -->
  <div class="orders-panel">
    <div class="orders-header">
      <span class="orders-title">📋 我的订单<span class="orders-count" id="ordersCount">0</span></span>
      <button class="btn-refresh-orders" onclick="loadOrders()">刷新</button>
    </div>
    <div class="orders-list" id="ordersList">
      <div class="orders-empty" id="ordersEmpty">
        <div class="icon">📭</div>
        <div>切换用户后加载订单</div>
      </div>
    </div>
  </div>
</div>

<script>
const API = '';
let senderId = '1';
let messages = [];

// =========== Init ===========
document.addEventListener('DOMContentLoaded', () => {
  const uid = document.getElementById('userIdInput').value.trim();
  if (uid) { senderId = uid; switchUser(); }
});

// =========== Switch User ===========
async function switchUser() {
  const uid = document.getElementById('userIdInput').value.trim();
  if (!uid) { showToast('请输入用户ID', 'error'); return; }
  senderId = uid;
  clearChat();
  await checkUserStatus();
  loadOrders();
}

// =========== Check User Status ===========
async function checkUserStatus() {
  const warning = document.getElementById('statusWarning');
  const inputArea = document.getElementById('inputArea');
  const sendBtn = document.getElementById('sendBtn');
  const msgInput = document.getElementById('msgInput');

  try {
    const r = await fetch(`${API}/api/user/status?sender_id=${encodeURIComponent(senderId)}`);
    if (!r.ok) {
      if (r.status === 404) {
        showWarning(`用户ID ${senderId} 不存在，无法对话。`, inputArea, warning, msgInput, sendBtn);
      } else {
        showWarning('查询用户状态失败，请稍后重试。', inputArea, warning, msgInput, sendBtn);
      }
      return;
    }
    const data = await r.json();
    if (data.can_chat) {
      hideWarning(inputArea, warning, msgInput, sendBtn);
      loadHistory();
    } else {
      showWarning(
        `当前用户ID：${data.sender_id} 的用户状态为【${data.status_label}】，无法对话。`,
        inputArea, warning, msgInput, sendBtn
      );
    }
  } catch (e) {
    console.error(e);
    showWarning('查询用户状态失败，请稍后重试。', inputArea, warning, msgInput, sendBtn);
  }
}

function showWarning(msg, inputArea, warning, msgInput, sendBtn) {
  warning.textContent = msg;
  warning.style.display = 'block';
  inputArea.classList.add('disabled');
  msgInput.disabled = true;
  sendBtn.disabled = true;
}

function hideWarning(inputArea, warning, msgInput, sendBtn) {
  warning.style.display = 'none';
  inputArea.classList.remove('disabled');
  msgInput.disabled = false;
  sendBtn.disabled = false;
}

// =========== Load Orders ===========
async function loadOrders() {
  try {
    const r = await fetch(`${API}/api/orders?sender_id=${encodeURIComponent(senderId)}`);
    if (!r.ok) {
      const detail = await r.json().then(d => d.detail || '').catch(() => '');
      throw new Error(detail || `HTTP ${r.status}`);
    }
    const data = await r.json();
    renderOrders(data.orders || []);
  } catch (e) {
    console.error('加载订单失败:', e);
    const msg = e.message && e.message.includes('Connect') ? '数据后台未启动' :
                e.message || '网络异常';
    document.getElementById('ordersList').innerHTML =
      `<div class="orders-empty"><div class="icon">⚠</div><div>订单服务暂不可用</div><div style="font-size:12px;color:#999;margin-top:4px;">${escapeHtml(msg)}</div></div>`;
  }
}

function renderOrders(orders) {
  const list = document.getElementById('ordersList');
  const count = document.getElementById('ordersCount');

  count.textContent = orders.length;

  if (orders.length === 0) {
    list.innerHTML = '<div class="orders-empty"><div class="icon">📭</div><div>暂无订单</div></div>';
    return;
  }

  // Store orders data for click handler
  list._ordersData = orders;

  list.innerHTML = orders.map((order, index) => {
    const statusLabel = getStatusLabel(order.order_status);
    const statusClass = getStatusClass(order.order_status);
    const time = formatTime(order.paid_at || order.created_at);
    const amount = order.total_amount != null ? '¥' + Number(order.total_amount).toFixed(2) : '—';

    return `
      <div class="order-card" data-order-index="${index}">
        <div class="order-card-row">
          <span class="order-card-no">${escapeHtml(order.order_no) || '—'}</span>
          <span class="order-card-status ${statusClass}">${statusLabel}</span>
        </div>
        <div class="order-card-row">
          <span class="order-card-amount">${amount}</span>
        </div>
        <div class="order-card-row">
          <span class="order-card-time">${time || '—'}</span>
        </div>
      </div>`;
  }).join('');

  // Attach click handlers
  list.querySelectorAll('.order-card').forEach(card => {
    card.addEventListener('click', function() {
      const idx = parseInt(this.getAttribute('data-order-index'));
      sendOrderCard(list._ordersData[idx]);
    });
  });
}

function getStatusLabel(status) {
  const map = {
    'paid': '已支付', 'pending': '待支付', 'cancelled': '已取消',
    'refunded': '已退款', 'refunding': '退款中', 'expired': '已过期',
    'failed': '支付失败', 'completed': '已完成'
  };
  return map[status] || status || '未知';
}

function getStatusClass(status) {
  const map = {
    'paid': 'status-paid', 'completed': 'status-completed',
    'pending': 'status-pending',
    'cancelled': 'status-cancelled',
    'refunded': 'status-refunded', 'refunding': 'status-refunding',
    'expired': 'status-expired', 'failed': 'status-failed'
  };
  return map[status] || 'status-cancelled';
}

function formatTime(str) {
  if (!str) return '';
  try {
    const d = new Date(str);
    if (isNaN(d.getTime())) return str;
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  } catch (e) {
    return str;
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// =========== Send Order Card (OBJECT message) ===========
async function sendOrderCard(order) {
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  const objectData = {
    id: order.order_no || String(order.order_id),
    type: 'order',
    title: '订单 ' + (order.order_no || order.order_id),
    attributes: {
      status: order.order_status || '',
      amount: order.total_amount != null ? String(order.total_amount) : ''
    }
  };

  // Show card bubble in chat
  addMessageToChat('user', null, objectData);

  // Show typing
  const typingEl = showTyping();

  try {
    const r = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sender_id: senderId, object: objectData })
    });
    if (!r.ok) throw new Error('请求失败');
    const data = await r.json();
    removeTyping(typingEl);

    if (data.messages) {
      data.messages.forEach(m => addMessageToChat('bot', m.text, m.object));
    }
    scrollToBottom();
  } catch (e) {
    removeTyping(typingEl);
    showToast('发送失败，请稍后重试', 'error');
    console.error(e);
  }

  btn.disabled = false;
}

// =========== Load History ===========
async function loadHistory() {
  try {
    const r = await fetch(`${API}/api/chat/history?sender_id=${encodeURIComponent(senderId)}`);
    if (!r.ok) throw new Error('加载历史失败');
    const data = await r.json();
    clearChat();
    if (data.messages && data.messages.length > 0) {
      data.messages.forEach(m => addMessageToChat(m.role, m.text, m.object));
      addHistorySeparator();
    }
    scrollToBottom();
  } catch (e) {
    console.error(e);
  }
}

function addHistorySeparator() {
  const area = document.getElementById('chatArea');
  const sep = document.createElement('div');
  sep.className = 'history-separator';
  sep.innerHTML = '<span>以上为历史消息</span>';
  sep.id = 'historySeparator';
  area.appendChild(sep);
}

function clearChat() {
  messages = [];
  const area = document.getElementById('chatArea');
  area.innerHTML = '';
}

// =========== Send Text Message ===========
function sendQuick(text) {
  document.getElementById('msgInput').value = text;
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  input.value = '';

  addMessageToChat('user', text, null);

  const typingEl = showTyping();

  try {
    const r = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sender_id: senderId, text })
    });
    if (!r.ok) throw new Error('请求失败');
    const data = await r.json();
    removeTyping(typingEl);

    if (data.messages) {
      data.messages.forEach(m => addMessageToChat('bot', m.text, m.object));
    }
    scrollToBottom();
  } catch (e) {
    removeTyping(typingEl);
    showToast('发送失败，请稍后重试', 'error');
    console.error(e);
  }

  btn.disabled = false;
  input.focus();
}

// =========== Chat Rendering ===========
function addMessageToChat(role, text, object) {
  const area = document.getElementById('chatArea');
  const hint = document.getElementById('welcomeHint');
  if (hint) hint.style.display = 'none';

  const row = document.createElement('div');
  row.className = 'msg-row ' + role;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'bot' ? '♪' : '👤';
  row.appendChild(avatar);

  const content = document.createElement('div');

  if (text) {
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    content.appendChild(bubble);
  }

  if (object) {
    const card = document.createElement('div');
    card.className = 'msg-card';
    card.innerHTML = '<strong>' + (object.title || object.type || '卡片') + '</strong>';
    if (object.id) card.innerHTML += '<br>ID: ' + object.id;
    if (object.attributes && object.attributes.status) {
      card.innerHTML += '<br>状态: ' + object.attributes.status;
    }
    if (object.attributes && object.attributes.amount) {
      card.innerHTML += '<br>金额: ¥' + object.attributes.amount;
    }
    content.appendChild(card);
  }

  row.appendChild(content);
  area.appendChild(row);
  scrollToBottom();
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const hint = document.getElementById('welcomeHint');
  if (hint) hint.style.display = 'none';

  const el = document.createElement('div');
  el.className = 'typing-indicator';
  el.innerHTML = '<span></span><span></span><span></span>';
  area.appendChild(el);
  scrollToBottom();
  return el;
}

function removeTyping(el) {
  if (el && el.parentNode) el.parentNode.removeChild(el);
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
}

// =========== Keyboard ===========
function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// =========== Toast ===========
function showToast(msg, type) {
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 2500);
}
</script>
